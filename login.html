<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker || login</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <!-- Tailwind and Daisyui link -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- css link -->
  <!-- <link rel="stylesheet" href="style.css"> -->


  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- font awsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />


<!-- <link rel="stylesheet" href="./style/style.css"> -->

</head>

<body class="bg-base-200 google-font min-h-screen max-h-md flex justify-center items-center">


  <section class="bg-white shadow-xl rounded-lg p-8">
    <div class="logo text-center p-8">
      <div class="flex justify-center mb-5">
        <img class="mx-auto" src="./assets/github-logo.png" alt="">
      </div>
      <h2 class="text-3xl font-bold mt-4">GitHub Issues Tracker</h2>
      <p class=" text-gray-400 mt-1">Sign in to manage your issues</p>
    </div>

    <div class="form ">
      <div class="card  w-full max-w-sm shrink-0 ">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-xl text-black">Username</label>
            <input id="user-name" type="text" class="input outline-none border-2 border-gray-200" placeholder="Enter Username" />
            <p class="text-xs text-purple-400 mt-1">Default: admin</p>
            <label class="label text-xl text-black ">Password</label>
            <input id="password" type="password" class="input outline-none border-2 border-gray-200" placeholder="Password" />
            <p class="text-xs text-purple-400 mt-1">Default: admin123</p>
            <button id="login-btn"  class="btn btn-primary mt-4">Sign In</button>
          </fieldset>
        </div>
      </div>
    </div>
  </section>

 

  <script src="./script/login.js"></script>
</body>

</html>
